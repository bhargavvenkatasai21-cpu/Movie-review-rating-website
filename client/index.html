<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Review Website</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">

        <h1 class="logo">🎬 Movie Review System</h1>

        <div class="nav-right">

            <input
                type="text"
                id="searchInput"
                placeholder="Search movies..."
            >

            <button onclick="searchMovie()">
                Search
            </button>

            <button id="logoutBtn" onclick="logout()">
                Logout
            </button>

        </div>

    </nav>

    <section class="hero">

        <h2>Popular Movies</h2>

        <p>
            Search your favourite movies and share your reviews.
        </p>

    </section>

    <div id="movies" class="movies-container"></div>

    <script src="js/app.js"></script>

</body>
</html>
